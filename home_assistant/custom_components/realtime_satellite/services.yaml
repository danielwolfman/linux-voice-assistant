apply_settings:
  name: Apply Settings
  description: Apply one or more runtime settings for the Linux Realtime satellite.
  fields:
    openai_api_key:
      name: OpenAI API Key
      selector:
        text:
          type: password
    openai_model:
      name: OpenAI Model
      selector:
        text:
    openai_voice:
      name: OpenAI Voice
      selector:
        text:
    openai_instructions:
      name: OpenAI Instructions
      description: Full system prompt for the Linux assistant.
      selector:
        text:
          multiline: true
    wakeup_sound:
      name: Wakeup Sound
      selector:
        text:
    processing_sound:
      name: Processing Sound
      selector:
        text:
    tool_call_sound:
      name: Tool Call Sound
      selector:
        text:
    session_end_sound:
      name: Session End Sound
      selector:
        text:
    discord_allowed_user_ids:
      name: Discord Allowed User IDs
      description: Comma-separated Discord user IDs allowed to DM or mention the bot and receive assistant messages.
      selector:
        text:
    session_timeout_seconds:
      name: Session Timeout Seconds
      selector:
        number:
          min: 1
          max: 120
          step: 1
    vad_threshold:
      name: VAD Threshold
      selector:
        number:
          min: 0.001
          max: 0.1
          step: 0.001
    min_speech_seconds:
      name: Minimum Speech Seconds
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1
    end_silence_seconds:
      name: End Silence Seconds
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1
    refractory_seconds:
      name: Wake Word Refractory Seconds
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
    memory_interactions_count:
      name: Memory Interactions
      description: Number of recent user and assistant interaction pairs loaded into context on wakeup.
      selector:
        number:
          min: 0
          max: 25
          step: 1
    follow_up_after_tool_call:
      name: Keep Listening After Tool Call
      selector:
        boolean:
    enable_tool_get_entities:
      name: Enable Get Entities Tool
      selector:
        boolean:
    enable_tool_get_state:
      name: Enable Get State Tool
      selector:
        boolean:
    enable_tool_call_service:
      name: Enable Call Service Tool
      selector:
        boolean:
    enable_tool_web_search:
      name: Enable Web Search Tool
      selector:
        boolean:
    enable_tool_discord:
      name: Enable Discord Tool
      selector:
        boolean:

refresh_openai_catalog:
  name: Refresh OpenAI Catalog
  description: Refresh the available OpenAI Realtime model list used by the Realtime Satellite selectors.

record_activity:
  name: Record Activity
  description: Record a satellite activity item into Home Assistant activity history.
  fields:
    category:
      name: Category
      selector:
        text:
    message:
      name: Message
      selector:
        text:
    details:
      name: Details
      selector:
        object:

record_usage:
  name: Record Usage
  description: Record a satellite usage sample into Home Assistant cost and token totals.
  fields:
    model:
      name: Model
      selector:
        text:
    input_tokens:
      name: Input Tokens
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
    output_tokens:
      name: Output Tokens
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
    total_tokens:
      name: Total Tokens
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
    cost_usd:
      name: Cost USD
      selector:
        number:
          min: 0
          max: 100
          step: 0.000001

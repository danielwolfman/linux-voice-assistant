apply_settings:
  name: Apply Settings
  description: Apply one or more runtime settings for the Linux Realtime satellite.
  fields:
    openai_api_key:
      name: OpenAI API Key
      selector:
        text:
          type: password
    openai_model:
      name: OpenAI Model
      selector:
        text:
    openai_voice:
      name: OpenAI Voice
      selector:
        text:
    openai_instructions:
      name: OpenAI Instructions
      description: Full system prompt for the Linux assistant.
      selector:
        text:
          multiline: true
    wakeup_sound:
      name: Wakeup Sound
      selector:
        text:
    processing_sound:
      name: Processing Sound
      selector:
        text:
    tool_call_sound:
      name: Tool Call Sound
      selector:
        text:
    session_end_sound:
      name: Session End Sound
      selector:
        text:
    session_timeout_seconds:
      name: Session Timeout Seconds
      selector:
        number:
          min: 1
          max: 120
          step: 1
    vad_threshold:
      name: VAD Threshold
      selector:
        number:
          min: 0.001
          max: 0.1
          step: 0.001
    min_speech_seconds:
      name: Minimum Speech Seconds
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1
    end_silence_seconds:
      name: End Silence Seconds
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1
    refractory_seconds:
      name: Wake Word Refractory Seconds
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
    follow_up_after_tool_call:
      name: Keep Listening After Tool Call
      selector:
        boolean:

refresh_openai_catalog:
  name: Refresh OpenAI Catalog
  description: Refresh the available OpenAI Realtime model list used by the Realtime Satellite selectors.
